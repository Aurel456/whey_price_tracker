name: Daily price tracking

on:
  schedule:
    # Tous les jours à 9h UTC (10h Paris hiver / 11h Paris été)
    - cron: '0 9 * * *'
  workflow_dispatch:  # déclenchement manuel depuis l'onglet Actions

permissions:
  contents: write  # nécessaire pour commit + push

# Force les actions JavaScript sur Node 24 (Node 20 sera retiré en sept 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: track-prices
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run trackers (HSN + MyProtein en parallèle)
        # Les deux scripts écrivent des fichiers disjoints (Excel/HTML/logs séparés)
        # → aucune contention. On les lance en arrière-plan et on attend les deux.
        # Temps total ≈ max(HSN, MyProtein) au lieu de la somme. On NE fait jamais
        # échouer le job ici : le sanity check de chaque script protège déjà ses
        # propres fichiers, et l'étape commit ne pousse que ce qui a changé — un
        # site KO n'empêche pas l'autre d'être committé.
        run: |
          python hsn_tracker.py & PID_HSN=$!
          python myprotein_tracker.py & PID_MP=$!
          wait $PID_HSN; echo "HSN exit=$?"
          wait $PID_MP;  echo "MyProtein exit=$?"

      - name: Show errors log (if any)
        if: always()
        run: |
          for f in errors.log myprotein_errors.log; do
            if [ -f "$f" ]; then
              echo "=== $f ==="
              tail -n 100 "$f"
            fi
          done

      - name: Commit and push prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add whey_prices.xlsx whey_dashboard.html recommandations.html \
                  docs/index.html docs/dashboard.html \
                  myprotein_prices.xlsx myprotein_dashboard.html myprotein-recommandations.html \
                  docs/myprotein-dashboard.html docs/myprotein.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily price update — $(date -u +%Y-%m-%d)"
            git push
          fi
