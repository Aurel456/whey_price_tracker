name: Daily price tracking

on:
  schedule:
    # Tous les jours à 9h UTC (10h Paris hiver / 11h Paris été)
    - cron: '0 9 * * *'
  workflow_dispatch:  # déclenchement manuel depuis l'onglet Actions

permissions:
  contents: write  # nécessaire pour commit + push

# Force les actions JavaScript sur Node 24 (Node 20 sera retiré en sept 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: track-prices
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run tracker
        run: python hsn_tracker.py

      - name: Show errors log (if any)
        if: always()
        run: |
          if [ -f errors.log ]; then
            echo "=== errors.log ==="
            tail -n 100 errors.log
          else
            echo "No errors logged"
          fi

      - name: Commit and push prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add whey_prices.xlsx whey_dashboard.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily price update — $(date -u +%Y-%m-%d)"
            git push
          fi
